services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    env_file: .env
    restart: unless-stopped

  dashboard:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./apps/dashboard:/app
      - ./packages:/packages
      - dashboard_modules:/app/node_modules
    command: sh -c "corepack enable && pnpm install && pnpm dev --host"
    ports:
      - "3000:3000"
    environment:
      - VITE_CONVEX_URL=${VITE_CONVEX_URL:-https://placeholder.convex.cloud}
    restart: unless-stopped

volumes:
  dashboard_modules:
