services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        # Dokploy exposes DOKPLOY_COMMIT_SHA at build time; fall back to
        # "unknown" for local builds. The resulting SHA is baked into
        # SERVICE_VERSION so SigNoz spans/logs show the actual deployed
        # commit instead of the literal `${DOKPLOY_COMMIT_SHA}` string.
        GIT_COMMIT_SHA: ${DOKPLOY_COMMIT_SHA:-unknown}
    ports:
      - "3111:3111"
      - "3112:3112"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3111/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        VITE_CONVEX_URL: ${VITE_CONVEX_URL:-https://placeholder.convex.cloud}
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
