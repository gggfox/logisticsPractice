name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  quality:
    name: Code Quality (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dead code (knip)
        run: pnpm analyze:deadcode
      - name: Duplication (jscpd)
        run: pnpm analyze:duplication
      - name: Complexity hotspots (code-complexity)
        run: pnpm analyze:complexity

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    # `apps/api/src/config.ts` parses `process.env` at module load and throws
    # when required vars are missing. Any test that imports a service or the
    # logger transitively imports `config.ts`, so CI needs stub values. These
    # are placeholders with no real credentials -- unit tests mock the outbound
    # HTTP calls and never reach the live services.
    env:
      CONVEX_URL: https://example.convex.cloud
      HAPPYROBOT_API_KEY: ci-stub-happyrobot
      BRIDGE_API_KEY: ci-stub-bridge
      ADMIN_API_KEY: ci-stub-admin
      FMCSA_WEB_KEY: ci-stub-fmcsa
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            packages/shared/coverage/
            apps/api/coverage/
          retention-days: 7

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Vite inlines `VITE_CONVEX_URL` at build time, and `apps/dashboard/src/config.ts`
    # throws a hard error when it's missing. Provide a stub URL so the bundle can
    # load even though no backend is reachable -- the E2E suite is scoped to the
    # static shell (sidebar, nav, dark mode) and does not exercise Convex queries.
    env:
      VITE_CONVEX_URL: https://example.convex.cloud
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npx playwright install --with-deps chromium
        working-directory: apps/dashboard
      - run: pnpm test:e2e
        working-directory: apps/dashboard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
