# Local dev config for the `iii` engine (0.10.x schema).
# Mirrors config-production.yaml but swaps Redis for built-in/in-memory
# adapters so you can run it without spinning up infra.
#
#   pnpm --filter @carrier-sales/api dev            # bundle dist/index-dev.js
#   iii --config apps/api/config-dev.yaml           # run the engine (ports 3111/3112)
#   iii console                                     # open http://127.0.0.1:3113
#
# NOTE: iii 0.11 renamed `modules:` -> `workers:` and `class:` -> `name:` and
# replaced the long Rust-style adapter paths with short IDs (`kv`, `redis`,
# `builtin`, `local`, ...). We are pinned to 0.10.x because motia@1.0.0 still
# emits the old `api` / `queue` trigger types that 0.10 accepts; see
# .cursor/plans/fix-iii-motia-version-drift_5f1a3b86.plan.md.

modules:
  - class: modules::api::RestApiModule
    config:
      port: ${HTTP_PORT:3111}
      host: 0.0.0.0
      default_timeout: 30000
      concurrency_request_limit: 1024
      cors:
        allowed_origins:
          - ${DASHBOARD_ORIGIN:http://localhost:3001}
          - http://localhost:3000
          - http://localhost:3113
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  - class: modules::stream::StreamModule
    config:
      port: ${STREAM_PORT:3112}
      host: 0.0.0.0
      adapter:
        class: modules::stream::adapters::KvStore
        config:
          store_method: in_memory

  - class: modules::state::StateModule
    config:
      adapter:
        class: modules::state::adapters::KvStore
        config:
          store_method: in_memory

  - class: modules::pubsub::PubSubModule
    config:
      adapter:
        class: modules::pubsub::LocalAdapter

  - class: modules::queue::QueueModule
    config:
      adapter:
        class: modules::queue::BuiltinQueueAdapter

  - class: modules::cron::CronModule
    config:
      adapter:
        class: modules::cron::KvCronAdapter

  - class: modules::observability::OtelModule
    config:
      enabled: ${OTEL_ENABLED:false}
      service_name: ${OTEL_SERVICE_NAME:carrier-sales-api}
      service_version: ${SERVICE_VERSION:1.0.0-dev}
      service_namespace: ${SERVICE_NAMESPACE:development}
      exporter: ${OTEL_EXPORTER_TYPE:otlp}
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      sampling_ratio: 1.0
      metrics_enabled: true
      metrics_exporter: ${OTEL_METRICS_EXPORTER:otlp}
      logs_enabled: ${OTEL_LOGS_ENABLED:false}
      logs_exporter: ${OTEL_LOGS_EXPORTER:otlp}

  - class: modules::shell::ExecModule
    config:
      exec:
        - node --enable-source-maps dist/index-dev.js
