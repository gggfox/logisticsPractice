# iii / Motia production config. Consumed by the `iii` binary in apps/api/Dockerfile.
# Local dev still uses apps/api/motia.config.yaml via `motia dev`.

workers:
  - name: iii-http
    config:
      port: ${HTTP_PORT:3111}
      host: 0.0.0.0
      default_timeout: 30000
      concurrency_request_limit: 1024
      cors:
        allowed_origins:
          - ${DASHBOARD_ORIGIN:https://dashboard.example.com}
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  - name: iii-stream
    config:
      port: ${STREAM_PORT:3112}
      host: 0.0.0.0
      adapter:
        name: redis
        config:
          redis_url: ${REDIS_URL:redis://redis:6379}

  - name: iii-state
    config:
      adapter:
        name: redis
        config:
          redis_url: ${REDIS_URL:redis://redis:6379}

  - name: iii-pubsub
    config:
      adapter:
        name: redis
        config:
          redis_url: ${REDIS_URL:redis://redis:6379}

  - name: iii-queue
    config:
      adapter:
        name: builtin

  - name: iii-cron
    config:
      adapter:
        name: kv

  - name: iii-observability
    config:
      enabled: ${OTEL_ENABLED:true}
      service_name: ${OTEL_SERVICE_NAME:carrier-sales-api}
      service_version: ${SERVICE_VERSION:1.0.0}
      service_namespace: ${SERVICE_NAMESPACE:production}
      exporter: ${OTEL_EXPORTER_TYPE:otlp}
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://signoz-otel-collector:4317}
      sampling_ratio: 1.0
      memory_max_spans: ${OTEL_MEMORY_MAX_SPANS:10000}
      metrics_enabled: true
      metrics_exporter: ${OTEL_METRICS_EXPORTER:otlp}
      metrics_retention_seconds: 3600
      metrics_max_count: 10000
      logs_enabled: ${OTEL_LOGS_ENABLED:true}
      logs_exporter: ${OTEL_LOGS_EXPORTER:otlp}
      logs_max_count: ${OTEL_LOGS_MAX_COUNT:1000}
      logs_retention_seconds: ${OTEL_LOGS_RETENTION_SECONDS:3600}
      logs_sampling_ratio: ${OTEL_LOGS_SAMPLING_RATIO:1.0}

  - name: iii-exec
    config:
      exec:
        - bun run --enable-source-maps dist/index-production.js
