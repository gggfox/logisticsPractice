# iii / Motia production config. Consumed by the `iii` binary in apps/api/Dockerfile.
# Local dev uses apps/api/config-dev.yaml.
#
# NOTE: We pin iii to 0.10.0 in the Dockerfile, which uses the
# `modules:` + `class:` schema (long Rust-style paths). 0.11 renamed
# this to `workers:` + `name:` with short IDs; do NOT migrate until
# we bump the iii version (see .cursor/plans/fix-iii-motia-version-drift_5f1a3b86.plan.md).

modules:
  - class: modules::api::RestApiModule
    config:
      port: ${HTTP_PORT:3111}
      host: 0.0.0.0
      default_timeout: 30000
      concurrency_request_limit: 1024
      cors:
        allowed_origins:
          - ${DASHBOARD_ORIGIN:https://dashboard.example.com}
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  - class: modules::stream::StreamModule
    config:
      port: ${STREAM_PORT:3112}
      host: 0.0.0.0
      adapter:
        class: modules::stream::adapters::RedisAdapter
        config:
          redis_url: ${REDIS_URL:redis://redis:6379}

  - class: modules::state::StateModule
    config:
      adapter:
        class: modules::state::adapters::RedisAdapter
        config:
          redis_url: ${REDIS_URL:redis://redis:6379}

  - class: modules::pubsub::PubSubModule
    config:
      adapter:
        class: modules::pubsub::RedisAdapter
        config:
          redis_url: ${REDIS_URL:redis://redis:6379}

  - class: modules::queue::QueueModule
    config:
      adapter:
        class: modules::queue::BuiltinQueueAdapter

  - class: modules::cron::CronModule
    config:
      adapter:
        class: modules::cron::KvCronAdapter

  - class: modules::observability::OtelModule
    config:
      enabled: ${OTEL_ENABLED:true}
      service_name: ${OTEL_SERVICE_NAME:carrier-sales-api}
      service_version: ${SERVICE_VERSION:1.0.0}
      service_namespace: ${SERVICE_NAMESPACE:production}
      exporter: ${OTEL_EXPORTER_TYPE:otlp}
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://signoz-otel-collector:4317}
      sampling_ratio: 1.0
      metrics_enabled: true
      metrics_exporter: ${OTEL_METRICS_EXPORTER:otlp}
      logs_enabled: ${OTEL_LOGS_ENABLED:true}
      logs_exporter: ${OTEL_LOGS_EXPORTER:otlp}

  - class: modules::shell::ExecModule
    config:
      exec:
        - bun run --enable-source-maps dist/index-production.js
